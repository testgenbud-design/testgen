<script>

const WEBHOOK_URL = "https://testgenbud.app.n8n.cloud/webhook/784ad307-2557-47ff-810f-1da294633360";

let requestInFlight = false;
let lastRequestTime = 0;

const REQUEST_TIMEOUT = 45000;
const MIN_REQUEST_INTERVAL = 3000;
const MAX_RETRIES = 2;


if (WEBHOOK_URL) {
  document.getElementById("webhookNote").style.display = "none";
}



function sanitizeInput(str){
  if(!str) return "";
  return str.trim().replace(/[<>]/g,"");
}



function validateForm(data){

  const required = ["exam_type","subject","topic","difficulty","question_type","num_questions"];

  for(const key of required){
    if(!data[key]) return "Please fill in all required fields.";
  }

  if(data.num_questions < 1 || data.num_questions > 30){
    return "Number of questions must be between 1 and 30.";
  }

  if(data.subject.length > 80 || data.topic.length > 120){
    return "Subject or topic too long.";
  }

  if(data.teacher_email){
    const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
    if(!emailRegex.test(data.teacher_email)){
      return "Invalid email address.";
    }
  }

  return null;
}



function createTimeoutSignal(timeout){
  const controller = new AbortController();
  setTimeout(()=>controller.abort(),timeout);
  return controller;
}



async function fetchWithRetry(url,options,retries=MAX_RETRIES){

  try{

    const controller = createTimeoutSignal(REQUEST_TIMEOUT);

    const res = await fetch(url,{
      ...options,
      signal:controller.signal
    });

    if(!res.ok){
      throw new Error(`Server returned ${res.status}`);
    }

    return res;

  }catch(err){

    if(retries > 0){
      await new Promise(r=>setTimeout(r,1500));
      return fetchWithRetry(url,options,retries-1);
    }

    throw err;
  }
}



function parseResponse(text){

  try{
    const json = JSON.parse(text);

    return (
      json.generated_test ||
      json.output ||
      json.result ||
      json.data?.generated_test ||
      (Array.isArray(json) && json[0]?.generated_test) ||
      (Array.isArray(json) && json[0]?.output) ||
      text
    );

  }catch{
    return text;
  }
}



async function generateTest(){

  if(requestInFlight) return;

  if(Date.now() - lastRequestTime < MIN_REQUEST_INTERVAL){
    showError("Please wait a few seconds before generating another test.");
    return;
  }

  if(!navigator.onLine){
    showError("You appear to be offline.");
    return;
  }

  const form   = document.getElementById("testForm");
  const btn    = document.getElementById("generateBtn");
  const bar    = document.getElementById("loadingBar");
  const status = document.getElementById("loadingStatus");
  const result = document.getElementById("resultSection");
  const error  = document.getElementById("errorBox");



  const data = {
    exam_type: sanitizeInput(form.exam_type.value),
    subject: sanitizeInput(form.subject.value),
    topic: sanitizeInput(form.topic.value),
    difficulty: sanitizeInput(form.difficulty.value),
    question_type: sanitizeInput(form.question_type.value),
    num_questions: Number(form.num_questions.value),
    teacher_email: sanitizeInput(form.teacher_email.value)
  };



  const validationError = validateForm(data);

  if(validationError){
    showError(validationError);
    return;
  }



  requestInFlight = true;
  lastRequestTime = Date.now();



  btn.disabled = true;
  btn.innerHTML = '<span class="btn-icon">⏳</span> Generating…';

  bar.classList.add("active");
  status.classList.add("active");
  result.classList.remove("visible");
  error.classList.remove("visible");



  try{

    const response = await fetchWithRetry(
      WEBHOOK_URL,
      {
        method:"POST",
        headers:{
          "Content-Type":"application/json"
        },
        body:JSON.stringify(data)
      }
    );



    const text = await response.text();
    const output = parseResponse(text);

    showResult(output,data);

  }
  catch(err){

    if(err.name === "AbortError"){
      showError("Request timed out. The AI server may be overloaded.");
    }else{
      showError("Failed to generate test. "+err.message);
    }

  }
  finally{

    requestInFlight = false;

    btn.disabled = false;
    btn.innerHTML = '<span class="btn-icon">⚡</span> Generate Test Paper';

    bar.classList.remove("active");
    status.classList.remove("active");
  }

}



function showResult(text,formData){

  const result = document.getElementById("resultSection");
  const output = document.getElementById("testOutput");
  const meta   = document.getElementById("resultMeta");
  const time   = document.getElementById("resultTime");

  output.textContent = text;

  time.textContent = new Date().toLocaleString("en-IN",{
    dateStyle:"medium",
    timeStyle:"short"
  });

  meta.innerHTML = [
    formData.exam_type,
    formData.subject,
    formData.topic,
    formData.difficulty,
    formData.num_questions + " questions"
  ]
  .map(v=>`<span class="meta-chip">${v}</span>`)
  .join("");

  result.classList.add("visible");

  result.scrollIntoView({
    behavior:"smooth",
    block:"start"
  });
}



function showError(msg){

  const error = document.getElementById("errorBox");
  document.getElementById("errorMsg").textContent = msg;

  error.classList.add("visible");

  error.scrollIntoView({
    behavior:"smooth",
    block:"nearest"
  });
}



async function copyTest(){

  const text = document.getElementById("testOutput").textContent;

  try{

    await navigator.clipboard.writeText(text);

    const btn = document.querySelector(".btn-copy");
    btn.textContent = "✓ Copied!";

    setTimeout(()=>{
      btn.innerHTML = "📋 Copy";
    },2000);

  }catch{
    alert("Copy failed. Select text manually.");
  }

}



function resetForm(){

  document.getElementById("testForm").reset();

  document.getElementById("resultSection").classList.remove("visible");
  document.getElementById("errorBox").classList.remove("visible");

  window.scrollTo({
    top:0,
    behavior:"smooth"
  });

}

</script>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TestGen AI</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>

body{
font-family:Inter,system-ui;
background:#0f172a;
color:white;
margin:0;
padding:40px;
display:flex;
justify-content:center;
}

.container{
max-width:700px;
width:100%;
}

h1{
font-size:40px;
margin-bottom:10px;
}

p{
color:#94a3b8;
}

.card{
background:#1e293b;
padding:30px;
border-radius:12px;
margin-top:30px;
}

.grid{
display:grid;
grid-template-columns:1fr 1fr;
gap:15px;
}

input,select{
width:100%;
padding:12px;
border-radius:8px;
border:1px solid #334155;
background:#0f172a;
color:white;
}

button{
margin-top:20px;
padding:14px;
width:100%;
border:none;
border-radius:10px;
background:#f59e0b;
font-weight:600;
cursor:pointer;
}

button:disabled{
opacity:0.5;
cursor:not-allowed;
}

.result{
margin-top:30px;
background:#020617;
padding:20px;
border-radius:10px;
white-space:pre-wrap;
max-height:500px;
overflow:auto;
}

.meta{
margin-bottom:10px;
font-size:13px;
color:#94a3b8;
}

.error{
color:#f87171;
margin-top:15px;
}

.loading{
margin-top:10px;
color:#fbbf24;
}

</style>
</head>
<body>

<div class="container">

<h1>TestGen AI</h1>
<p>Generate JEE / NEET practice tests instantly.</p>

<div class="card">

<form id="testForm">

<div class="grid">

<select name="exam_type" required>
<option value="">Exam</option>
<option value="JEE Mains">JEE Mains</option>
<option value="NEET">NEET</option>
</select>

<select name="question_type" required>
<option value="">Question Type</option>
<option value="MCQ">MCQ</option>
</select>

<input name="subject" placeholder="Subject (Physics)" required>

<input name="topic" placeholder="Topic (Thermodynamics)" required>

<select name="difficulty" required>
<option value="">Difficulty</option>
<option>Easy</option>
<option>Moderate</option>
<option>Hard</option>
<option>Mixed</option>
</select>

<input name="num_questions" type="number" placeholder="Questions (10)" required>

</div>

<input name="teacher_email" type="email" placeholder="Teacher Email (optional)" style="margin-top:15px">

<button id="generateBtn">Generate Test</button>

</form>

<div class="loading" id="loading"></div>
<div class="error" id="error"></div>

</div>

<div class="result" id="result" style="display:none"></div>

</div>

<script>

const WEBHOOK_URL = "https://testgenbud.app.n8n.cloud/webhook/784ad307-2557-47ff-810f-1da294633360"

const form = document.getElementById("testForm")
const resultBox = document.getElementById("result")
const loading = document.getElementById("loading")
const errorBox = document.getElementById("error")
const button = document.getElementById("generateBtn")

form.addEventListener("submit", async (e) => {

e.preventDefault()

errorBox.textContent = ""
loading.textContent = "Generating test..."
resultBox.style.display = "none"

button.disabled = true

const data = Object.fromEntries(new FormData(form))

try{

const res = await fetch(WEBHOOK_URL,{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify(data)
})

let text = await res.text()

let json

try{
json = JSON.parse(text)
}catch{
json = {generated_test:text}
}

const output =
json.generated_test ||
json.output ||
json.result ||
(Array.isArray(json) && json[0]?.generated_test) ||
(Array.isArray(json) && json[0]?.output) ||
text

resultBox.textContent = output
resultBox.style.display = "block"

loading.textContent = ""

}catch(err){

errorBox.textContent = "Request failed: "+err.message
loading.textContent = ""

}

button.disabled = false

})

</script>

</body>
</html>
